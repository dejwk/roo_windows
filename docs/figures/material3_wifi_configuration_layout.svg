<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640">
  <rect width="1100" height="640" fill="#ffffff"/>
  <style>
    .title { font: 600 18px sans-serif; fill: #111827; }
    .subtitle { font: 13px sans-serif; fill: #4b5563; }
    .screen { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
    .bar { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1.5; }
    .section { font: 600 12px sans-serif; fill: #1f2937; }
    .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    .row-strong { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.2; }
    .row-edit { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.2; }
    .label { font: 13px sans-serif; fill: #111827; }
    .small { font: 11px sans-serif; fill: #475569; }
    .tiny { font: 10px sans-serif; fill: #64748b; }
    .pill { fill: #dcfce7; stroke: #22c55e; stroke-width: 1; }
    .switch-on { fill: #2563eb; }
    .switch-track { fill: #bfdbfe; stroke: #60a5fa; stroke-width: 1; }
    .chip { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 1; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 5 4; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="28" y="34" class="title">Material 3 Wi-Fi configuration activity flow and major surface regions</text>
  <text x="28" y="56" class="subtitle">The flow keeps high-multiplicity network lists recyclable, while details and edit surfaces use richer Material 3 settings rows and inline advanced options.</text>

  <g transform="translate(36,100)">
    <rect x="0" y="0" width="230" height="470" rx="24" class="screen"/>
    <rect x="18" y="18" width="194" height="36" rx="12" class="bar"/>
    <text x="34" y="41" class="label">Wi-Fi settings</text>
    <circle cx="188" cy="36" r="8" fill="#93c5fd" stroke="#2563eb" stroke-width="1.2"/>
    <path d="M 184 36 L 188 40 L 194 32" stroke="#1d4ed8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="18" y="78" class="section">1. Root activity</text>
    <rect x="18" y="90" width="194" height="48" rx="12" class="row-strong"/>
    <text x="34" y="112" class="label">Wi-Fi</text>
    <text x="34" y="127" class="small">Master switch row</text>
    <rect x="150" y="101" width="42" height="22" rx="11" class="switch-track"/>
    <circle cx="179" cy="112" r="9" class="switch-on"/>

    <rect x="18" y="148" width="194" height="64" rx="12" class="row-strong"/>
    <text x="34" y="172" class="label">Roof loop</text>
    <text x="34" y="188" class="small">Connected • WPA2 • Tap for details</text>
    <rect x="164" y="163" width="28" height="16" rx="8" class="pill"/>
    <text x="170" y="175" class="tiny">Now</text>

    <text x="18" y="238" class="section">Available networks</text>
    <rect x="18" y="248" width="194" height="20" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="34" y="262" class="tiny">Scanning… inline status row</text>
    <rect x="18" y="278" width="194" height="58" rx="12" class="row"/>
    <text x="34" y="301" class="label">Workshop</text>
    <text x="34" y="317" class="small">Saved • WPA3</text>
    <rect x="174" y="292" width="18" height="18" rx="9" class="pill"/>
    <text x="180" y="305" class="tiny">✓</text>
    <rect x="18" y="344" width="194" height="58" rx="12" class="row"/>
    <text x="34" y="367" class="label">Guest</text>
    <text x="34" y="383" class="small">Open • direct connect</text>
    <rect x="18" y="410" width="194" height="58" rx="12" class="row"/>
    <text x="34" y="433" class="label">Hidden AP</text>
    <text x="34" y="449" class="small">Secured • opens edit form</text>

    <rect x="18" y="486" width="194" height="34" rx="12" class="row"/>
    <text x="34" y="507" class="label">Add network</text>
    <rect x="18" y="528" width="194" height="34" rx="12" class="row"/>
    <text x="34" y="549" class="label">Saved networks</text>
  </g>

  <g transform="translate(304,100)">
    <rect x="0" y="0" width="220" height="470" rx="24" class="screen"/>
    <rect x="18" y="18" width="184" height="36" rx="12" class="bar"/>
    <text x="34" y="41" class="label">Saved networks</text>

    <text x="18" y="78" class="section">2. Recycled saved list</text>
    <rect x="18" y="92" width="184" height="58" rx="12" class="row"/>
    <text x="34" y="115" class="label">Roof loop</text>
    <text x="34" y="131" class="small">Connected • Auto-connect</text>
    <rect x="18" y="160" width="184" height="58" rx="12" class="row"/>
    <text x="34" y="183" class="label">Lab network</text>
    <text x="34" y="199" class="small">Static IP • Manual proxy</text>
    <rect x="18" y="228" width="184" height="58" rx="12" class="row"/>
    <text x="34" y="251" class="label">Projector</text>
    <text x="34" y="267" class="small">Auto-connect off</text>

    <rect x="18" y="318" width="184" height="96" rx="14" class="note"/>
    <text x="32" y="344" class="small">Same recycled row widget as</text>
    <text x="32" y="360" class="small">scan results; only supporting</text>
    <text x="32" y="376" class="small">text policy changes.</text>
  </g>

  <g transform="translate(564,100)">
    <rect x="0" y="0" width="232" height="470" rx="24" class="screen"/>
    <rect x="18" y="18" width="196" height="36" rx="12" class="bar"/>
    <text x="34" y="41" class="label">Network details</text>

    <text x="18" y="78" class="section">3. Read-mostly details page</text>
    <rect x="18" y="92" width="196" height="78" rx="14" class="row-strong"/>
    <text x="34" y="118" class="label">Roof loop</text>
    <text x="34" y="136" class="small">Connected • Randomized MAC</text>
    <text x="34" y="152" class="small">IP 192.168.4.17</text>

    <rect x="18" y="182" width="60" height="28" rx="14" fill="#2563eb"/>
    <text x="33" y="200" fill="#ffffff" class="tiny">Edit</text>
    <rect x="86" y="182" width="68" height="28" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="101" y="200" class="tiny">Forget</text>
    <rect x="162" y="182" width="52" height="28" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="173" y="200" class="tiny">Close</text>

    <rect x="18" y="226" width="196" height="40" rx="10" class="row"/>
    <text x="34" y="250" class="label">Auto-connect</text>
    <rect x="170" y="238" width="24" height="14" rx="7" class="switch-track"/>
    <circle cx="187" cy="245" r="6" class="switch-on"/>
    <rect x="18" y="272" width="196" height="40" rx="10" class="row"/>
    <text x="34" y="296" class="label">Privacy</text>
    <text x="132" y="296" class="small">Randomized</text>
    <rect x="18" y="318" width="196" height="40" rx="10" class="row"/>
    <text x="34" y="342" class="label">IP settings</text>
    <text x="162" y="342" class="small">Static</text>
    <rect x="18" y="364" width="196" height="40" rx="10" class="row"/>
    <text x="34" y="388" class="label">Proxy</text>
    <text x="154" y="388" class="small">Manual</text>

    <rect x="18" y="422" width="196" height="104" rx="14" class="note"/>
    <text x="32" y="446" class="small">Read-only rows remain visible</text>
    <text x="32" y="462" class="small">when the controller can report</text>
    <text x="32" y="478" class="small">values but not edit them.</text>
    <text x="32" y="500" class="small">Network stays open and marks</text>
    <text x="32" y="516" class="small">status as Out of range when a</text>
    <text x="32" y="532" class="small">scan refresh drops the AP.</text>
  </g>

  <g transform="translate(838,100)">
    <rect x="0" y="0" width="226" height="470" rx="24" class="screen"/>
    <rect x="18" y="18" width="190" height="36" rx="12" class="bar"/>
    <text x="34" y="41" class="label">Add / edit network</text>

    <text x="18" y="78" class="section">4. One shared edit form</text>
    <rect x="18" y="92" width="190" height="42" rx="10" class="row-edit"/>
    <text x="34" y="117" class="label">SSID</text>
    <text x="134" y="117" class="small">Roof loop</text>
    <rect x="18" y="140" width="190" height="42" rx="10" class="row-edit"/>
    <text x="34" y="165" class="label">Security</text>
    <text x="132" y="165" class="small">WPA2 / WPA3</text>
    <rect x="18" y="188" width="190" height="42" rx="10" class="row-edit"/>
    <text x="34" y="213" class="label">Password</text>
    <text x="152" y="213" class="small">••••••••</text>

    <rect x="18" y="244" width="190" height="34" rx="10" class="chip"/>
    <text x="32" y="266" class="label">Advanced options expanded</text>

    <rect x="18" y="286" width="190" height="34" rx="10" class="row"/>
    <text x="34" y="308" class="label">IP settings</text>
    <text x="156" y="308" class="small">Static</text>
    <rect x="18" y="326" width="190" height="34" rx="10" class="row"/>
    <text x="34" y="348" class="label">Proxy</text>
    <text x="152" y="348" class="small">Manual</text>
    <rect x="18" y="366" width="190" height="32" rx="10" class="row-edit"/>
    <text x="34" y="387" class="small">IP address    192.168.4.17</text>
    <rect x="18" y="402" width="190" height="32" rx="10" class="row-edit"/>
    <text x="34" y="423" class="small">Gateway       192.168.4.1</text>
    <rect x="18" y="438" width="190" height="32" rx="10" class="row-edit"/>
    <text x="34" y="459" class="small">Prefix length 24</text>
    <rect x="18" y="474" width="190" height="32" rx="10" class="row-edit"/>
    <text x="34" y="495" class="small">DNS 1         1.1.1.1</text>
    <rect x="18" y="510" width="190" height="32" rx="10" class="row-edit"/>
    <text x="34" y="531" class="small">Proxy host    proxy.local</text>

    <rect x="18" y="548" width="76" height="28" rx="14" fill="#2563eb"/>
    <text x="41" y="566" fill="#ffffff" class="tiny">Connect</text>
    <rect x="102" y="548" width="66" height="28" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="124" y="566" class="tiny">Cancel</text>
  </g>

  <path d="M 267 252 C 286 252, 286 252, 300 252" class="arrow"/>
  <path d="M 267 538 C 310 538, 310 430, 554 430" class="arrow"/>
  <path d="M 527 192 C 546 192, 546 192, 560 192" class="arrow"/>
  <path d="M 799 196 C 818 196, 818 196, 834 196" class="arrow"/>

  <rect x="410" y="586" width="302" height="34" rx="12" class="note"/>
  <text x="428" y="608" class="small">Details and edit screens are low-cardinality, so they use richer Material 3 settings rows. High-multiplicity lists stay recyclable.</text>
</svg>