<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#ffffff"/>
  <style>
    .title { font: 600 30px 'DejaVu Sans', sans-serif; fill: #1f1f1f; }
    .section { font: 600 22px 'DejaVu Sans', sans-serif; fill: #1f1f1f; }
    .label { font: 500 17px 'DejaVu Sans', sans-serif; fill: #2f2a28; }
    .caption { font: 400 15px 'DejaVu Sans', sans-serif; fill: #5b5652; }
    .token { font: 500 15px 'DejaVu Sans Mono', monospace; fill: #3c3734; }
    .surface { fill: #fbf8f5; stroke: #6f655c; stroke-width: 2; }
    .panel { fill: #f7f2ee; stroke: #6f655c; stroke-width: 2; }
    .scrim { fill: #ebe5df; stroke: #b7aea7; stroke-width: 1.5; }
    .field { fill: #ffffff; stroke: #6f655c; stroke-width: 2; }
    .fieldlabel { font: 400 13px 'DejaVu Sans', sans-serif; fill: #7c7168; }
    .weekday { font: 600 13px 'DejaVu Sans', sans-serif; fill: #6c6259; }
    .day { font: 500 14px 'DejaVu Sans', sans-serif; fill: #3b3632; }
    .daymuted { font: 500 14px 'DejaVu Sans', sans-serif; fill: #a69d96; }
    .selected { fill: #715547; }
    .today { fill: none; stroke: #715547; stroke-width: 2.5; }
    .button { fill: #efe7df; stroke: #7b7066; stroke-width: 1.5; }
    .action { fill: #f1e5d8; stroke: #705949; stroke-width: 1.5; }
    .divider { stroke: #cdc3bb; stroke-width: 1.5; }
    .guide { stroke: #a99c90; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
    .arrow { stroke: #7a6e64; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6e64"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">Material 3 date picker family: docked, modal calendar, and modal input</text>
  <text x="40" y="78" class="caption">The same single-date session model drives the field text, modal input, and owner-painted 7 x 6 month grid.</text>

  <text x="70" y="126" class="section">Docked field</text>
  <rect x="70" y="150" width="330" height="56" rx="12" ry="12" class="field"/>
  <text x="92" y="170" class="fieldlabel">Date</text>
  <text x="92" y="188" class="label">04/18/2026</text>
  <rect x="352" y="164" width="24" height="24" rx="6" ry="6" class="button"/>
  <path d="M360 171 H368 M360 180 H368 M360 189 H368" stroke="#705949" stroke-width="2"/>
  <path d="M385 178 L430 178 L430 242" class="arrow"/>
  <text x="438" y="182" class="caption">opens anchored popup</text>

  <rect x="58" y="242" width="360" height="420" rx="24" ry="24" class="surface"/>
  <text x="84" y="274" class="caption">Anchored below the field when it fits; otherwise the field promotes to modal.</text>
  <rect x="82" y="294" width="72" height="32" rx="10" ry="10" class="button"/>
  <text x="102" y="315" class="label">April</text>
  <rect x="164" y="294" width="62" height="32" rx="10" ry="10" class="button"/>
  <text x="182" y="315" class="label">2026</text>
  <rect x="298" y="294" width="32" height="32" rx="16" ry="16" class="button"/>
  <text x="309" y="316" class="label">&lt;</text>
  <rect x="338" y="294" width="32" height="32" rx="16" ry="16" class="button"/>
  <text x="349" y="316" class="label">&gt;</text>
  <line x1="82" y1="340" x2="394" y2="340" class="divider"/>

  <text x="94" y="365" class="weekday">S</text>
  <text x="136" y="365" class="weekday">M</text>
  <text x="178" y="365" class="weekday">T</text>
  <text x="220" y="365" class="weekday">W</text>
  <text x="262" y="365" class="weekday">T</text>
  <text x="304" y="365" class="weekday">F</text>
  <text x="346" y="365" class="weekday">S</text>

  <circle cx="102" cy="395" r="16" class="selected"/>
  <text x="97" y="400" fill="#ffffff" class="day">6</text>
  <circle cx="144" cy="395" r="16" class="today"/>
  <text x="139" y="400" class="day">7</text>
  <text x="181" y="400" class="day">8</text>
  <text x="223" y="400" class="day">9</text>
  <text x="261" y="400" class="day">10</text>
  <text x="303" y="400" class="day">11</text>
  <text x="345" y="400" class="day">12</text>

  <text x="97" y="444" class="day">13</text>
  <text x="139" y="444" class="day">14</text>
  <text x="181" y="444" class="day">15</text>
  <text x="223" y="444" class="day">16</text>
  <text x="261" y="444" class="day">17</text>
  <text x="303" y="444" class="day">18</text>
  <text x="345" y="444" class="day">19</text>

  <text x="97" y="488" class="day">20</text>
  <text x="139" y="488" class="day">21</text>
  <text x="181" y="488" class="day">22</text>
  <text x="223" y="488" class="day">23</text>
  <text x="261" y="488" class="day">24</text>
  <text x="303" y="488" class="day">25</text>
  <text x="345" y="488" class="day">26</text>

  <text x="94" y="532" class="daymuted">27</text>
  <text x="136" y="532" class="daymuted">28</text>
  <text x="178" y="532" class="daymuted">29</text>
  <text x="220" y="532" class="daymuted">30</text>
  <text x="262" y="532" class="daymuted">1</text>
  <text x="304" y="532" class="daymuted">2</text>
  <text x="346" y="532" class="daymuted">3</text>

  <line x1="82" y1="574" x2="394" y2="574" class="divider"/>
  <rect x="232" y="590" width="64" height="34" rx="12" ry="12" class="button"/>
  <text x="246" y="612" class="label">Cancel</text>
  <rect x="306" y="590" width="72" height="34" rx="12" ry="12" class="action"/>
  <text x="329" y="612" class="label">OK</text>
  <text x="82" y="642" class="token">shared draft date + anchored popup placement</text>

  <text x="470" y="126" class="section">Modal calendar</text>
  <rect x="470" y="150" width="330" height="500" rx="26" ry="26" class="scrim"/>
  <rect x="492" y="176" width="286" height="448" rx="28" ry="28" class="surface"/>
  <text x="518" y="210" class="caption">scrim-backed popup wrapper</text>
  <text x="518" y="238" class="caption">centered when the fixed panel fits</text>
  <rect x="716" y="210" width="32" height="32" rx="16" ry="16" class="button"/>
  <text x="726" y="232" class="label">#</text>
  <text x="518" y="280" class="label">Thu, Apr 18</text>
  <text x="518" y="304" class="caption">Select date</text>
  <line x1="516" y1="320" x2="754" y2="320" class="divider"/>
  <rect x="520" y="334" width="32" height="32" rx="16" ry="16" class="button"/>
  <text x="531" y="356" class="label">&lt;</text>
  <rect x="718" y="334" width="32" height="32" rx="16" ry="16" class="button"/>
  <text x="729" y="356" class="label">&gt;</text>
  <text x="606" y="356" class="label">April 2026</text>

  <text x="525" y="388" class="weekday">S</text>
  <text x="559" y="388" class="weekday">M</text>
  <text x="593" y="388" class="weekday">T</text>
  <text x="627" y="388" class="weekday">W</text>
  <text x="661" y="388" class="weekday">T</text>
  <text x="695" y="388" class="weekday">F</text>
  <text x="729" y="388" class="weekday">S</text>

  <circle cx="537" cy="418" r="14" class="selected"/>
  <text x="532" y="423" fill="#ffffff" class="day">6</text>
  <circle cx="571" cy="418" r="14" class="today"/>
  <text x="566" y="423" class="day">7</text>
  <text x="600" y="423" class="day">8</text>
  <text x="634" y="423" class="day">9</text>
  <text x="665" y="423" class="day">10</text>
  <text x="699" y="423" class="day">11</text>
  <text x="733" y="423" class="day">12</text>

  <text x="532" y="460" class="day">13</text>
  <text x="566" y="460" class="day">14</text>
  <text x="600" y="460" class="day">15</text>
  <text x="634" y="460" class="day">16</text>
  <text x="665" y="460" class="day">17</text>
  <text x="699" y="460" class="day">18</text>
  <text x="733" y="460" class="day">19</text>

  <text x="532" y="502" class="day">20</text>
  <text x="566" y="502" class="day">21</text>
  <text x="600" y="502" class="day">22</text>
  <text x="634" y="502" class="day">23</text>
  <text x="665" y="502" class="day">24</text>
  <text x="699" y="502" class="day">25</text>
  <text x="733" y="502" class="day">26</text>

  <line x1="516" y1="548" x2="754" y2="548" class="divider"/>
  <rect x="600" y="566" width="58" height="32" rx="12" ry="12" class="button"/>
  <text x="613" y="587" class="label">Cancel</text>
  <rect x="668" y="566" width="58" height="32" rx="12" ry="12" class="action"/>
  <text x="687" y="587" class="label">OK</text>
  <text x="516" y="614" class="caption">The same wrapper expands full-screen on compact tasks.</text>

  <text x="872" y="126" class="section">Modal input</text>
  <rect x="872" y="150" width="330" height="500" rx="26" ry="26" class="scrim"/>
  <rect x="894" y="194" width="286" height="362" rx="28" ry="28" class="surface"/>
  <text x="920" y="228" class="caption">same modal wrapper, input entry mode</text>
  <rect x="1118" y="228" width="32" height="32" rx="16" ry="16" class="button"/>
  <text x="1128" y="250" class="label">@</text>
  <text x="920" y="270" class="label">Thu, Apr 18</text>
  <text x="920" y="294" class="caption">Enter date</text>
  <line x1="918" y1="312" x2="1156" y2="312" class="divider"/>
  <rect x="922" y="344" width="232" height="58" rx="12" ry="12" class="field"/>
  <text x="944" y="364" class="fieldlabel">Date</text>
  <text x="944" y="384" class="label">04/18/2026</text>
  <text x="922" y="430" class="caption">Invalid text keeps the panel in input mode and disables OK.</text>
  <line x1="918" y1="470" x2="1156" y2="470" class="divider"/>
  <rect x="1002" y="488" width="58" height="32" rx="12" ry="12" class="button"/>
  <text x="1015" y="509" class="label">Cancel</text>
  <rect x="1070" y="488" width="58" height="32" rx="12" ry="12" class="action"/>
  <text x="1089" y="509" class="label">OK</text>

  <path d="M780 268 C835 268, 855 268, 885 268" class="guide"/>
  <text x="824" y="252" class="caption">toggle</text>
  <text x="40" y="714" class="token">Shared month-grid math: offset = (weekday(first-of-month) - first-weekday + 7) mod 7; cell = offset + day - 1</text>
  <text x="40" y="738" class="caption">The picker family keeps day cells, month rows, and year rows owner-painted so permanent RAM stays on the public field and modal wrappers instead of on dozens of child widgets.</text>
</svg>