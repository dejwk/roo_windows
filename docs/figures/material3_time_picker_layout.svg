<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 740" width="1220" height="740">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 5 L 10 0 L 10 10 z" fill="#6b7280" />
    </marker>
    <style>
      text {
        font-family: "DejaVu Sans", Arial, sans-serif;
        fill: #1f2933;
        font-size: 18px;
      }
      .small { font-size: 14px; fill: #4b5563; }
      .section { font-size: 14px; letter-spacing: 1px; fill: #6b7280; }
      .title { font-size: 17px; font-weight: 700; }
      .window { fill: #f4f7fb; stroke: #5f6770; stroke-width: 2; }
      .scrim { fill: #4b5563; opacity: 0.12; }
      .panel { fill: #f7f4ec; stroke: #5f6770; stroke-width: 2; }
      .selector { fill: #e7e9ee; stroke: #8c97a4; stroke-width: 2; }
      .selector-active { fill: #c7d7ff; stroke: #5b7fc7; stroke-width: 2; }
      .period-active { fill: #d8ccff; }
      .period-outline { fill: #f7f4ec; stroke: #8c97a4; stroke-width: 2; }
      .dial { fill: #edf1f6; stroke: #8c97a4; stroke-width: 2; }
      .dial-guide { stroke: #bcc6d2; stroke-width: 1.5; fill: none; }
      .dial-track { stroke: #4c7bd9; stroke-width: 3; fill: none; }
      .dial-handle { fill: #4c7bd9; }
      .dial-center { fill: #4c7bd9; }
      .button { fill: #ffffff; stroke: #8c97a4; stroke-width: 2; }
      .button-text { font-size: 15px; }
      .toggle { fill: #ffffff; stroke: #8c97a4; stroke-width: 2; }
      .keyboard { fill: #e5ebf3; stroke: #8c97a4; stroke-width: 2; }
      .key { fill: #ffffff; stroke: #9aa8ba; stroke-width: 1.5; }
      .dim { stroke: #6b7280; stroke-width: 2; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .leader { stroke: #6b7280; stroke-width: 2; fill: none; }
      .note { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; }
      .divider { stroke: #c4ccd6; stroke-width: 2; stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1220" height="740" fill="#ffffff" />

  <text x="54" y="36">Material 3 time picker geometry and fallback</text>

  <text class="section" x="58" y="70">VERTICAL DIAL</text>
  <rect class="window" x="42" y="86" width="360" height="616" rx="16" ry="16" />
  <rect class="scrim" x="56" y="100" width="332" height="588" rx="12" ry="12" />
  <rect class="panel" x="76" y="118" width="292" height="552" rx="28" ry="28" />

  <text class="small" x="102" y="148">Select time</text>

  <rect class="selector-active" x="100" y="170" width="96" height="80" rx="18" ry="18" />
  <text x="126" y="221">07</text>
  <rect class="selector" x="212" y="170" width="96" height="80" rx="18" ry="18" />
  <text x="238" y="221">35</text>
  <text x="198" y="220">:</text>
  <rect class="period-outline" x="316" y="170" width="40" height="80" rx="18" ry="18" />
  <rect class="period-active" x="316" y="170" width="40" height="39" rx="18" ry="18" />
  <line x1="316" y1="210" x2="356" y2="210" stroke="#8c97a4" stroke-width="2" />
  <text class="small" x="326" y="195">AM</text>
  <text class="small" x="326" y="236">PM</text>

  <circle class="dial" cx="222" cy="414" r="128" />
  <circle class="dial-guide" cx="222" cy="414" r="88" />
  <line class="dial-track" x1="222" y1="414" x2="312" y2="503" />
  <circle class="dial-handle" cx="312" cy="503" r="24" />
  <circle class="dial-center" cx="222" cy="414" r="4" />
  <text class="small" x="214" y="306">12</text>
  <text class="small" x="293" y="328">2</text>
  <text class="small" x="325" y="418">3</text>
  <text class="small" x="290" y="520">5</text>
  <text class="small" x="214" y="548">6</text>
  <text class="small" x="122" y="520">7</text>
  <text class="small" x="104" y="418">9</text>
  <text class="small" x="132" y="328">10</text>

  <circle class="toggle" cx="110" cy="614" r="22" />
  <text class="small" x="100" y="619">kbd</text>
  <rect class="button" x="214" y="590" width="62" height="36" rx="18" ry="18" />
  <rect class="button" x="286" y="590" width="52" height="36" rx="18" ry="18" />
  <text class="button-text" x="227" y="613">CANCEL</text>
  <text class="button-text" x="302" y="613">OK</text>

  <line class="dim" x1="94" y1="274" x2="350" y2="274" />
  <text class="small" x="171" y="264">256dp dial</text>
  <line class="dim" x1="100" y1="260" x2="196" y2="260" />
  <text class="small" x="115" y="251">96dp selector</text>
  <line class="dim" x1="316" y1="260" x2="356" y2="260" />
  <text class="small" x="300" y="251">52dp</text>

  <text class="section" x="454" y="70">HORIZONTAL DIAL</text>
  <rect class="window" x="438" y="86" width="738" height="270" rx="16" ry="16" />
  <rect class="scrim" x="452" y="100" width="710" height="242" rx="12" ry="12" />
  <rect class="panel" x="472" y="116" width="670" height="210" rx="28" ry="28" />

  <text class="small" x="498" y="144">Select time</text>
  <rect class="selector-active" x="498" y="166" width="96" height="80" rx="18" ry="18" />
  <text x="524" y="217">07</text>
  <rect class="selector" x="610" y="166" width="96" height="80" rx="18" ry="18" />
  <text x="636" y="217">35</text>
  <text x="596" y="216">:</text>
  <rect class="period-outline" x="714" y="166" width="40" height="80" rx="18" ry="18" />
  <rect class="period-active" x="714" y="166" width="40" height="39" rx="18" ry="18" />
  <line x1="714" y1="206" x2="754" y2="206" stroke="#8c97a4" stroke-width="2" />
  <text class="small" x="724" y="191">AM</text>
  <text class="small" x="724" y="232">PM</text>

  <circle class="dial" cx="938" cy="206" r="96" />
  <circle class="dial-guide" cx="938" cy="206" r="68" />
  <line class="dial-track" x1="938" y1="206" x2="1004" y2="140" />
  <circle class="dial-handle" cx="1004" cy="140" r="18" />
  <circle class="dial-center" cx="938" cy="206" r="4" />
  <text class="small" x="931" y="118">12</text>
  <text class="small" x="1001" y="154">2</text>
  <text class="small" x="1027" y="210">3</text>
  <text class="small" x="996" y="284">5</text>
  <text class="small" x="930" y="305">6</text>
  <text class="small" x="854" y="282">7</text>

  <circle class="toggle" cx="500" cy="286" r="18" />
  <text class="small" x="491" y="291">kbd</text>
  <rect class="button" x="640" y="268" width="62" height="34" rx="17" ry="17" />
  <rect class="button" x="712" y="268" width="52" height="34" rx="17" ry="17" />
  <text class="button-text" x="653" y="290">CANCEL</text>
  <text class="button-text" x="728" y="290">OK</text>

  <rect class="note" x="780" y="126" width="188" height="84" rx="14" ry="14" />
  <text class="title" x="798" y="152">Fallback step 1</text>
  <text class="small" x="798" y="178">If the vertical dial does not fit,</text>
  <text class="small" x="798" y="198">the picker rotates before giving</text>
  <text class="small" x="798" y="218">up on dial mode.</text>
  <path class="leader" d="M 968 190 H 1000" />

  <text class="section" x="454" y="396">INPUT MODE WITH SHARED KEYBOARD</text>
  <rect class="window" x="438" y="412" width="738" height="290" rx="16" ry="16" />
  <rect class="scrim" x="452" y="426" width="710" height="262" rx="12" ry="12" />
  <rect class="panel" x="472" y="444" width="670" height="118" rx="28" ry="28" />
  <text class="small" x="498" y="472">Select time</text>

  <rect class="selector-active" x="498" y="492" width="96" height="72" rx="18" ry="18" />
  <text x="524" y="537">07</text>
  <text class="small" x="523" y="582">Hour</text>
  <rect class="selector" x="610" y="492" width="96" height="72" rx="18" ry="18" />
  <text x="636" y="537">35</text>
  <text class="small" x="628" y="582">Minute</text>
  <text x="596" y="535">:</text>
  <rect class="period-outline" x="714" y="492" width="40" height="72" rx="18" ry="18" />
  <rect class="period-active" x="714" y="492" width="40" height="35" rx="18" ry="18" />
  <line x1="714" y1="528" x2="754" y2="528" stroke="#8c97a4" stroke-width="2" />
  <text class="small" x="724" y="514">AM</text>
  <text class="small" x="724" y="550">PM</text>

  <circle class="toggle" cx="500" cy="526" r="18" />
  <text class="small" x="491" y="531">clk</text>
  <rect class="button" x="1004" y="516" width="62" height="34" rx="17" ry="17" />
  <rect class="button" x="1076" y="516" width="52" height="34" rx="17" ry="17" />
  <text class="button-text" x="1017" y="538">CANCEL</text>
  <text class="button-text" x="1092" y="538">OK</text>

  <line class="divider" x1="472" y1="586" x2="1142" y2="586" />
  <text class="small" x="958" y="578">Reserved viewport above keyboard</text>

  <rect class="keyboard" x="472" y="600" width="670" height="84" rx="14" ry="14" />
  <rect class="key" x="560" y="614" width="54" height="24" rx="6" ry="6" />
  <rect class="key" x="624" y="614" width="54" height="24" rx="6" ry="6" />
  <rect class="key" x="688" y="614" width="54" height="24" rx="6" ry="6" />
  <rect class="key" x="560" y="646" width="54" height="24" rx="6" ry="6" />
  <rect class="key" x="624" y="646" width="54" height="24" rx="6" ry="6" />
  <rect class="key" x="688" y="646" width="54" height="24" rx="6" ry="6" />
  <rect class="key" x="752" y="614" width="78" height="24" rx="6" ry="6" />
  <rect class="key" x="752" y="646" width="78" height="24" rx="6" ry="6" />
  <text class="small" x="578" y="631">1</text>
  <text class="small" x="642" y="631">2</text>
  <text class="small" x="706" y="631">3</text>
  <text class="small" x="578" y="663">4</text>
  <text class="small" x="642" y="663">5</text>
  <text class="small" x="706" y="663">6</text>
  <text class="small" x="774" y="631">DEL</text>
  <text class="small" x="770" y="663">ENTER</text>
  <text class="small" x="840" y="646">Digits page from shared keyboard popup task</text>

  <rect class="note" x="828" y="468" width="274" height="90" rx="14" ry="14" />
  <text class="title" x="846" y="494">Fallback step 2</text>
  <text class="small" x="846" y="520">If neither dial layout fits, the picker</text>
  <text class="small" x="846" y="540">switches to input mode and reserves</text>
  <text class="small" x="846" y="560">the docked keyboard viewport.</text>
  <path class="leader" d="M 1042 560 V 586" />

  <rect class="note" x="54" y="612" width="310" height="60" rx="14" ry="14" />
  <text class="small" x="72" y="638">The picker never scrolls. If even the conservative input layout does not fit,</text>
  <text class="small" x="72" y="658">the presenter returns false instead of showing a clipped modal surface.</text>
</svg>