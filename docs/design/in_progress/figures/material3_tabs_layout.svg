<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <rect x="0" y="0" width="980" height="360" fill="#ffffff"/>

  <style>
    .title { font: 600 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
    .label { font: 12px Arial, Helvetica, sans-serif; fill: #374151; }
    .note { font: 11px Arial, Helvetica, sans-serif; fill: #4b5563; }
    .small { font: 10px Arial, Helvetica, sans-serif; fill: #6b7280; }
    .outline { stroke: #9ca3af; stroke-width: 1.5; fill: none; }
    .dash { stroke: #9ca3af; stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }
    .surface { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .tab { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
    .selected { fill: #eef2ff; stroke: #a5b4fc; stroke-width: 1; }
    .divider { stroke: #94a3b8; stroke-width: 1; }
    .indicator { fill: #2563eb; }
    .icon { fill: #64748b; }
    .icon-active { fill: #2563eb; }
    .text { font: 12px Arial, Helvetica, sans-serif; fill: #64748b; }
    .text-active { font: 12px Arial, Helvetica, sans-serif; fill: #2563eb; }
    .badge { fill: #d32f2f; }
    .badge-text { font: 9px Arial, Helvetica, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #64748b; stroke-width: 1.25; marker-end: url(#arrow); fill: none; }
    .measure { stroke: #6b7280; stroke-width: 1; marker-start: url(#bar); marker-end: url(#bar); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
    <marker id="bar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M4,0 L4,8" stroke="#6b7280" stroke-width="1"/>
    </marker>
  </defs>

  <text x="56" y="34" class="title">Fixed primary tabs</text>
  <rect x="48" y="56" width="404" height="134" rx="8" class="surface"/>
  <line x1="48" y1="189" x2="452" y2="189" class="divider"/>

  <rect x="64" y="72" width="120" height="116" class="tab"/>
  <rect x="184" y="72" width="132" height="116" class="selected"/>
  <rect x="316" y="72" width="120" height="116" class="tab"/>

  <text x="124" y="120" text-anchor="middle" class="text">Flights</text>

  <circle cx="250" cy="106" r="11" class="icon-active"/>
  <rect x="255" y="93" width="18" height="18" rx="9" class="badge"/>
  <text x="264" y="102" class="badge-text">3</text>
  <text x="250" y="136" text-anchor="middle" class="text-active">Trips</text>
  <rect x="217" y="184" width="66" height="3" rx="1.5" class="indicator"/>

  <text x="376" y="120" text-anchor="middle" class="text">Explore</text>

  <line x1="72" y1="214" x2="72" y2="268" class="measure"/>
  <text x="82" y="244" class="label">64dp icon + label height</text>

  <line x1="216" y1="206" x2="284" y2="206" class="measure"/>
  <text x="201" y="223" class="small">indicator min 24dp, 3dp tall</text>

  <path d="M274 88 C304 74, 334 74, 360 88" class="arrow"/>
  <text x="362" y="82" class="note">badge overlaps icon by 6dp</text>

  <text x="56" y="298" class="note">Row-owned paint order: background, indicator, children, divider.</text>
  <text x="56" y="318" class="note">Indicator width tracks the label/icon content cluster, not the badge.</text>

  <text x="530" y="34" class="title">Scrollable secondary tabs</text>
  <rect x="522" y="56" width="404" height="114" rx="8" class="surface"/>
  <line x1="522" y1="169" x2="926" y2="169" class="divider"/>
  <rect x="534" y="68" width="380" height="88" class="dash"/>

  <line x1="586" y1="68" x2="586" y2="156" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="544" y="82" class="small">52dp leading inset</text>

  <rect x="586" y="82" width="82" height="74" class="tab"/>
  <rect x="668" y="82" width="110" height="74" class="selected"/>
  <rect x="778" y="82" width="86" height="74" class="tab"/>
  <rect x="864" y="82" width="86" height="74" class="tab"/>

  <text x="627" y="120" text-anchor="middle" class="text">Overview</text>

  <text x="713" y="120" text-anchor="middle" class="text-active">Messages</text>
  <rect x="746" y="109" width="20" height="16" rx="8" class="badge"/>
  <text x="756" y="117" class="badge-text">12</text>
  <rect x="689" y="167" width="51" height="2" rx="1" class="indicator"/>

  <text x="821" y="120" text-anchor="middle" class="text">Specs</text>
  <text x="907" y="120" text-anchor="middle" class="text">Related</text>

  <path d="M766 107 C800 88, 836 84, 866 92" class="arrow"/>
  <text x="869" y="90" class="note">label-inline badge, 4dp gap</text>

  <line x1="690" y1="196" x2="740" y2="196" class="measure"/>
  <text x="650" y="214" class="small">2dp indicator</text>

  <text x="530" y="298" class="note">Scrollable rows measure intrinsic widths, then auto-center the selected tab when possible.</text>
  <text x="530" y="318" class="note">The dashed frame shows the viewport; tabs to the right continue beyond the visible clip.</text>
</svg>