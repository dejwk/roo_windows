<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390">
  <rect x="0" y="0" width="980" height="390" fill="#ffffff"/>

  <style>
    .title { font: 600 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
    .label { font: 12px Arial, Helvetica, sans-serif; fill: #374151; }
    .note { font: 11px Arial, Helvetica, sans-serif; fill: #4b5563; }
    .small { font: 10px Arial, Helvetica, sans-serif; fill: #6b7280; }
    .viewport { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
    .page { stroke: #64748b; stroke-width: 1.2; }
    .page-a { fill: #dbeafe; }
    .page-b { fill: #d1fae5; }
    .page-c { fill: #fef3c7; }
    .detached { fill: none; stroke: #9ca3af; stroke-width: 1.2; stroke-dasharray: 5 4; }
    .arrow { stroke: #64748b; stroke-width: 1.25; marker-end: url(#arrow); fill: none; }
    .measure { stroke: #6b7280; stroke-width: 1; marker-start: url(#bar); marker-end: url(#bar); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
    <marker id="bar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M4,0 L4,8" stroke="#6b7280" stroke-width="1"/>
    </marker>
  </defs>

  <text x="52" y="34" class="title">Resting viewport</text>
  <rect x="48" y="56" width="396" height="250" class="viewport"/>
  <text x="58" y="74" class="small">Host bounds = one viewport</text>

  <rect x="-92" y="96" width="240" height="170" class="page page-a"/>
  <rect x="148" y="96" width="240" height="170" class="page page-b"/>
  <rect x="388" y="96" width="240" height="170" class="page page-c"/>

  <text x="28" y="126" class="label">Page i-1</text>
  <text x="230" y="126" class="label">Page i</text>
  <text x="430" y="126" class="label">Page i+1</text>
  <text x="196" y="154" class="note">selected page</text>
  <text x="196" y="176" class="note">p = i</text>
  <text x="196" y="198" class="note">x_i = 0</text>
  <text x="58" y="330" class="note">Immediate neighbors stay attached exactly one viewport offscreen.</text>
  <text x="58" y="348" class="note">Non-adjacent pages stay detached from the child set.</text>

  <rect x="676" y="110" width="170" height="122" class="detached"/>
  <text x="694" y="145" class="label">Page i-2</text>
  <text x="694" y="164" class="small">detached</text>
  <rect x="676" y="244" width="170" height="122" class="detached"/>
  <text x="694" y="279" class="label">Page i+2</text>
  <text x="694" y="298" class="small">detached</text>
  <path d="M444 180 C520 180, 566 170, 666 170" class="arrow"/>
  <path d="M444 214 C520 228, 566 264, 666 290" class="arrow"/>

  <text x="520" y="34" class="title">Mid-drag layout</text>
  <rect x="516" y="56" width="396" height="250" class="viewport"/>
  <text x="526" y="74" class="small">Fractional page position drives layout only</text>

  <rect x="440" y="96" width="240" height="170" class="page page-a"/>
  <rect x="680" y="96" width="240" height="170" class="page page-b"/>
  <rect x="920" y="96" width="240" height="170" class="page page-c"/>

  <text x="545" y="124" class="label">Page i</text>
  <text x="755" y="124" class="label">Page i+1</text>
  <text x="545" y="148" class="note">p = i + 0.35</text>
  <text x="545" y="170" class="note">x_i = -0.35W</text>
  <text x="755" y="170" class="note">x_(i+1) = 0.65W</text>

  <line x1="516" y1="320" x2="912" y2="320" class="measure"/>
  <text x="682" y="338" class="small">viewport width W</text>

  <text x="526" y="356" class="note">Measurement stays viewport-based; dragging changes child offsets, not host size.</text>
</svg>