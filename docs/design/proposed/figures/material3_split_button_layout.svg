<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360">
  <rect width="920" height="360" fill="#ffffff"/>
  <style>
    .title { font: 600 16px sans-serif; fill: #111827; }
    .label { font: 14px sans-serif; fill: #1f2937; }
    .small { font: 12px sans-serif; fill: #4b5563; }
    .segment { fill: #f2e7d8; stroke: #7c5c2f; stroke-width: 2; }
    .segment-open { fill: #e8f1ff; stroke: #2b5d8a; stroke-width: 2; }
    .anchor { fill: none; stroke: #2b5d8a; stroke-width: 2; stroke-dasharray: 6 5; }
    .menu { fill: #f7f1e7; stroke: #8a6c44; stroke-width: 2; }
    .guide { stroke: #6b7280; stroke-width: 1.8; stroke-dasharray: 5 4; }
    .arrow { stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
    .icon { stroke: #374151; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .content { fill: #374151; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="28" y="30" class="title">Material 3 split-button geometry and trailing menu anchor</text>
  <text x="28" y="52" class="small">The control is one widget, but it paints two coordinated surface islands separated by a fixed 2 dp gutter.</text>

  <g transform="translate(42,88)">
    <text x="0" y="0" class="label">1. Resting state</text>
    <path class="segment" d="M 28 22 L 228 22 A 8 8 0 0 1 236 30 L 236 70 A 8 8 0 0 1 228 78 L 28 78 A 28 28 0 0 1 0 50 A 28 28 0 0 1 28 22 Z"/>
    <path class="segment" d="M 248 30 A 8 8 0 0 1 256 22 L 292 22 A 28 28 0 0 1 320 50 A 28 28 0 0 1 292 78 L 256 78 A 8 8 0 0 1 248 70 Z"/>
    <text x="124" y="57" text-anchor="middle" class="label">Run</text>
    <circle cx="58" cy="50" r="8" class="content"/>
    <path class="icon" d="M 276 44 L 286 56 L 296 44"/>
    <line x1="240" y1="12" x2="240" y2="88" class="guide"/>
    <text x="206" y="110" class="small">2 dp gutter</text>
    <line x1="222" y1="98" x2="248" y2="98" class="arrow"/>
    <text x="330" y="44" class="small">Closed menu icon uses</text>
    <text x="330" y="60" class="small">a slight leading offset</text>
    <line x1="322" y1="52" x2="300" y2="52" class="arrow"/>
  </g>

  <g transform="translate(42,212)">
    <text x="0" y="0" class="label">2. Menu open state</text>
    <path class="segment" d="M 28 22 L 228 22 A 8 8 0 0 1 236 30 L 236 70 A 8 8 0 0 1 228 78 L 28 78 A 28 28 0 0 1 0 50 A 28 28 0 0 1 28 22 Z"/>
    <path class="segment-open" d="M 276 22 A 28 28 0 0 1 304 50 A 28 28 0 0 1 276 78 L 248 78 A 28 28 0 0 1 220 50 A 28 28 0 0 1 248 22 Z"/>
    <text x="124" y="57" text-anchor="middle" class="label">Run</text>
    <circle cx="58" cy="50" r="8" class="content"/>
    <path class="icon" d="M 254 46 L 262 54 L 270 46"/>
    <rect x="220" y="22" width="84" height="56" rx="28" class="anchor"/>
    <text x="336" y="38" class="small">The trailing segment becomes the</text>
    <text x="336" y="54" class="small">menu anchor and the open surface.</text>
    <line x1="328" y1="50" x2="306" y2="50" class="arrow"/>
    <rect x="420" y="12" width="170" height="116" rx="18" class="menu"/>
    <text x="442" y="42" class="small">Anchored menu panel</text>
    <text x="442" y="66" class="small">- related action 1</text>
    <text x="442" y="88" class="small">- related action 2</text>
    <text x="442" y="110" class="small">- related action 3</text>
    <line x1="304" y1="50" x2="418" y2="50" class="arrow"/>
  </g>

  <text x="42" y="340" class="small">Resting segments use a smaller inner corner toward the gutter. The trailing segment expands to a fully rounded inner edge while its menu is visible.</text>
</svg>