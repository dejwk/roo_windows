<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#ffffff"/>

  <style>
    .title { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
    .label { font: 13px Arial, Helvetica, sans-serif; fill: #374151; }
    .small { font: 12px Arial, Helvetica, sans-serif; fill: #4b5563; }
    .caption { font: 12px Arial, Helvetica, sans-serif; fill: #6b7280; }
    .frame { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    .bar { fill: #eef2f7; stroke: #cbd5e1; stroke-width: 2; }
    .target { fill: none; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5 4; }
    .indicator { fill: #c8d9ff; stroke: #5b8def; stroke-width: 1.5; }
    .icon { fill: #64748b; }
    .icon-selected { fill: #1f4fd8; }
    .badge { fill: #d93025; }
    .guide { stroke: #9ca3af; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="80" y="36" class="title">Vertical items (compact)</text>
  <text x="520" y="36" class="title">Horizontal items (medium)</text>

  <rect x="60" y="70" width="340" height="270" rx="24" class="frame"/>
  <rect x="80" y="242" width="300" height="78" rx="24" class="bar"/>

  <rect x="88" y="248" width="71" height="66" rx="16" class="target"/>
  <rect x="164" y="248" width="71" height="66" rx="16" class="target"/>
  <rect x="240" y="248" width="71" height="66" rx="16" class="target"/>
  <rect x="316" y="248" width="56" height="66" rx="16" class="target"/>

  <rect x="172" y="255" width="55" height="34" rx="17" class="indicator"/>
  <circle cx="199" cy="272" r="11" class="icon-selected"/>
  <circle cx="210" cy="263" r="6" class="badge"/>
  <text x="184" y="303" class="label">Inbox</text>

  <circle cx="124" cy="272" r="11" class="icon"/>
  <text x="111" y="303" class="label">Home</text>

  <circle cx="275" cy="272" r="11" class="icon"/>
  <text x="263" y="303" class="label">Saved</text>

  <circle cx="344" cy="272" r="11" class="icon"/>
  <text x="329" y="303" class="label">Me</text>

  <line x1="235" y1="281" x2="442" y2="281" class="guide"/>
  <text x="456" y="277" class="small">selected indicator stays icon-focused</text>
  <text x="456" y="294" class="small">label remains visible below it</text>

  <line x1="126" y1="246" x2="442" y2="210" class="guide"/>
  <text x="456" y="206" class="small">compact layout divides width into</text>
  <text x="456" y="223" class="small">equal target segments</text>

  <rect x="500" y="70" width="400" height="270" rx="24" class="frame"/>
  <rect x="520" y="248" width="360" height="64" rx="22" class="bar"/>

  <rect x="580" y="252" width="88" height="56" rx="16" class="target"/>
  <rect x="676" y="252" width="88" height="56" rx="16" class="target"/>
  <rect x="772" y="252" width="88" height="56" rx="16" class="target"/>

  <rect x="687" y="262" width="66" height="36" rx="18" class="indicator"/>
  <circle cx="704" cy="280" r="10" class="icon-selected"/>
  <circle cx="714" cy="271" r="6" class="badge"/>
  <text x="720" y="285" class="label">Inbox</text>

  <circle cx="608" cy="280" r="10" class="icon"/>
  <text x="624" y="285" class="label">Home</text>

  <circle cx="800" cy="280" r="10" class="icon"/>
  <text x="816" y="285" class="label">Saved</text>

  <line x1="548" y1="280" x2="470" y2="280" class="guide"/>
  <text x="308" y="276" class="small">extra medium-width space becomes</text>
  <text x="308" y="293" class="small">symmetric edge padding</text>

  <line x1="753" y1="280" x2="922" y2="206" class="guide"/>
  <text x="730" y="186" class="small">horizontal indicator hugs the</text>
  <text x="730" y="203" class="small">icon-plus-label content cluster</text>

  <line x1="714" y1="271" x2="922" y2="246" class="guide"/>
  <text x="730" y="236" class="small">badge stays anchored to the icon</text>
  <text x="730" y="253" class="small">corner in both layouts</text>

  <text x="60" y="382" class="caption">Both layouts use the same destination model. The full segment handles input, the selected indicator follows layout-specific content geometry, and the badge remains an icon-corner adornment instead of becoming part of the indicator silhouette.</text>
</svg>